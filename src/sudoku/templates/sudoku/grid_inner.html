<div class="ks-grid" role="grid" aria-label="Killer Sudoku grid">
{% for row in grid_rows %}<div class="ks-row" role="row">{% for cell in row %}
<button id="cell-{{ cell.row }}-{{ cell.col }}" class="ks-cell {{ cell.classes }}{% if selected.0 == cell.row and selected.1 == cell.col %} ks-cell-selected{% endif %}" role="gridcell" aria-label="Row {{ cell.row|add:1 }}, column {{ cell.col|add:1 }}{% if cell.sum %}, cage total {{ cell.sum }}{% endif %}" aria-selected="{% if selected.0 == cell.row and selected.1 == cell.col %}true{% else %}false{% endif %}" hx-post="{% url 'select_cell' cell.row cell.col %}" hx-target="#sudoku-app" hx-swap="outerHTML">
{% if cell.sum %}<span class="ks-cage-sum">{{ cell.sum }}</span>{% endif %}
{% if cell.final %}<span class="ks-final">{{ cell.final }}</span>{% else %}<span class="ks-notes">{% for n in notes_range %}<span class="ks-note">{% if n in cell.notes %}{{ n }}{% endif %}</span>{% endfor %}</span>{% endif %}</button>
{% endfor %}</div>{% endfor %}
</div>
